[style]
flavor = "gruvbox-dark"

# Git integration
[git]
status = true
added     = { fg = "#b8bb26" }    # Green
modified  = { fg = "#fabd2f" }    # Yellow
deleted   = { fg = "#fb4934" }    # Red
renamed   = { fg = "#83a598" }    # Blue
untracked = { fg = "#d3869b" }    # Purple
ignored   = { fg = "#665c54" }    # Gray

# Manager settings
[mgr]
show_hidden = true

# Preview pane (requires terminal with image support)
[preview]
enabled = true
image_enabled = true

# List columns
[list]
icon    = true
name    = true
size    = true
date    = true
perm    = false

# Sorting
[sorter]
primary = "type"
secondary = "name"

# Status bar
[status-line]
left = "%{~}"
right = "%{git_branch} %$(if [ -n \"$VIRTUAL_ENV\" ]; then basename \"$VIRTUAL_ENV\"; fi) %{selection}%{pinned}"

# Behavior
[behavior]
auto_refresh = false
delete_without_confirm = false
